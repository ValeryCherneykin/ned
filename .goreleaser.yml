version: 2

project_name: ned

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/ned
    binary: ned
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: ValeryCherneykin
    name: ned
  mode: replace
  name_template: "v{{ .Version }}"

brews:
  - name: ned
    repository:
      owner: ValeryCherneykin
      name: homebrew-ned
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update ned to {{ .Tag }}"
    homepage: https://github.com/ValeryCherneykin/ned
    description: "Open any remote file in your local editor over SSH or Docker"
    license: MIT
    install: |
      bin.install "ned"
    test: |
      system "#{bin}/ned --version"
