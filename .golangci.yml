# .golangci.yml for github.com/ValeryCherneykin/ned
# Comprehensive, strict configuration tailored for a high-quality public Go library.
# Goal: enforce readability, maintainability, idiomatic Go, security, and zero technical debt.
# Inspired by best practices from Kubernetes, Prometheus, and Uber Go style guides.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ValeryCherneykin/ned

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - prealloc
    - unparam
    - errorlint
    - gocritic
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true
      disable:
        - fieldalignment  # struct layout optimisation — opt-in, not a correctness issue
        - shadow          # too noisy in idiomatic Go; err re-use in if blocks is normal

    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G204  # subprocess with variable args — intentional (docker exec, editor open)
        - G304  # file path from variable — intentional (file editor tool by design)
        - G306  # public key is 0644 by convention (not secret)

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam      # target.Target is 80 bytes — fine for a CLI tool, not a hot loop
        - whyNoLint      # nolint without explanation is common in obvious cases

    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: receiver-naming
        - name: context-as-argument

    unparam:
      check-exported: false

exclusions:
  rules:
    # Test cleanup: os.Remove failure is logged but not fatal — intentional discard.
    - path: "_test\\.go"
      linters:
        - errcheck
    # gosec in tests is noise — no production security risk.
    - path: "_test\\.go"
      linters:
        - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
