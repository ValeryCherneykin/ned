# .golangci.yml for github.com/ValeryCherneykin/ned
# Comprehensive, strict configuration tailored for a high-quality public Go library.
# Goal: enforce readability, maintainability, idiomatic Go, security, and zero technical debt.
# Inspired by best practices from Kubernetes, Prometheus, and Uber Go style guides.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ValeryCherneykin/ned

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - prealloc
    - unparam
    - errorlint
    - gocritic
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true

    gosec:
      severity: medium
      confidence: medium

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: receiver-naming
        - name: context-as-argument

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
